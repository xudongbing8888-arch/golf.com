<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高尔夫期望杆数基准探索器</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        .control-panel { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .data-card { font-size: 24px; font-weight: bold; color: #d32f2f; margin-bottom: 15px; }
        .control-group { margin-bottom: 15px; }
        #chart { width: 100%; height: 400px; }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="data-card">当前期望杆数: <span id="current-strokes">2.98</span> 杆</div>
        
        <div class="control-group">
            <label for="distance">距离球洞 (<span id="dist-val">150</span> 码):</label>
            <input type="range" id="distance" min="50" max="250" value="150" style="width: 100%;">
        </div>

        <div class="control-group">
            <label>球位 (Lie): </label>
            <input type="radio" name="lie" value="fairway" checked> 球道
            <input type="radio" name="lie" value="rough"> 长草
            <input type="radio" name="lie" value="sand"> 沙坑
        </div>
    </div>

    <div id="chart"></div>

    <script>
        // 初始化图表
        const myChart = echarts.init(document.getElementById('chart'));
        
        // 模拟生成基准数据模型的函数
        function generateData() {
            const xData = [];
            const fairwayData = [];
            const roughData = [];
            const sandData = [];
            for (let i = 50; i <= 250; i += 5) {
                xData.push(i);
                // 这里使用简化的数学公式模拟真��曲线
                fairwayData.push((2.2 + i * 0.005).toFixed(2));
                roughData.push((2.3 + i * 0.0055).toFixed(2));
                sandData.push((2.4 + i * 0.006).toFixed(2));
            }
            return { xData, fairwayData, roughData, sandData };
        }

        const data = generateData();

        // 配置图表
        const option = {
            title: { text: '距离-期望杆数曲线' },
            tooltip: { trigger: 'axis' },
            legend: { data: ['球道', '长草', '沙坑'] },
            xAxis: { type: 'category', name: '距离(码)', data: data.xData },
            yAxis: { type: 'value', name: '期望杆数', min: 2.0, max: 4.5 },
            series: [
                { name: '球道', type: 'line', smooth: true, data: data.fairwayData },
                { name: '长草', type: 'line', smooth: true, data: data.roughData },
                { name: '沙坑', type: 'line', smooth: true, data: data.sandData }
            ]
        };
        myChart.setOption(option);

        // 交互逻辑绑定
        const distanceInput = document.getElementById('distance');
        const distValSpan = document.getElementById('dist-val');
        const currentStrokesSpan = document.getElementById('current-strokes');
        const lieInputs = document.getElementsByName('lie');

        function updateCard() {
            const dist = parseInt(distanceInput.value);
            distValSpan.innerText = dist;
            
            let lieType = 'fairway';
            lieInputs.forEach(input => { if(input.checked) lieType = input.value; });

            // 简单的计算逻辑用于卡片显示
            let strokes = 0;
            if(lieType === 'fairway') strokes = 2.2 + dist * 0.005;
            if(lieType === 'rough') strokes = 2.3 + dist * 0.0055;
            if(lieType === 'sand') strokes = 2.4 + dist * 0.006;
            
            currentStrokesSpan.innerText = strokes.toFixed(2);
        }

        distanceInput.addEventListener('input', updateCard);
        lieInputs.forEach(input => input.addEventListener('change', updateCard));
    </script>
</body>
</html>
