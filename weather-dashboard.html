<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气仪表板 - Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-box input {
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            width: 300px;
            max-width: 100%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .search-box button {
            padding: 12px 30px;
            font-size: 1em;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .unit-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .unit-toggle button {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .unit-toggle button.active {
            background: white;
            color: #667eea;
        }

        .current-weather {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: center;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .weather-icon {
            font-size: 80px;
            color: #667eea;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .temperature {
            font-size: 60px;
            font-weight: bold;
            color: #333;
        }

        .condition {
            font-size: 20px;
            color: #666;
            margin-top: 10px;
        }

        .location {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .detail-item {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .detail-item i {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .detail-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .detail-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .forecast {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .forecast h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .forecast-date {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 40px;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 16px;
            margin: 10px 0;
        }

        .forecast-temp-range {
            font-size: 12px;
            opacity: 0.8;
        }

        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .chart-container h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 40px;
        }

        .error {
            background: rgba(255, 0, 0, 0.9);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .current-weather {
                grid-template-columns: 1fr;
                padding: 20px;
            }

            .weather-details {
                grid-template-columns: 1fr;
            }

            .weather-icon {
                font-size: 60px;
            }

            .temperature {
                font-size: 40px;
            }

            header h1 {
                font-size: 1.8em;
            }

            .search-box {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box input {
                width: 100%;
            }

            .search-box button {
                width: 100%;
            }

            .charts-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 天气仪表板</h1>
            <p>Weather Dashboard - Global Weather Information</p>
        </header>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="搜索城市 / Search city..." />
            <button onclick="searchCity()"><i class="fas fa-search"></i> 搜索 / Search</button>
        </div>

        <div class="unit-toggle">
            <button class="active" onclick="setUnit('celsius')">°C / km/h</button>
            <button onclick="setUnit('fahrenheit')">°F / mph</button>
        </div>

        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">Loading weather data...</div>
        <div id="weatherContent"></div>
    </div>

    <script>
        let currentUnit = 'celsius';
        let currentWeatherData = null;
        let hourlyChart = null;
        let humidityChart = null;

        const weatherIcons = {
            0: '☀️',
            1: '🌤️',
            2: '⛅',
            3: '☁️',
            45: '🌫️',
            48: '🌫️',
            51: '🌧️',
            53: '🌧️',
            55: '🌧️',
            61: '🌧️',
            63: '🌧️',
            65: '⛈️',
            71: '❄️',
            73: '❄️',
            75: '❄️',
            77: '❄️',
            80: '🌧️',
            81: '⛈️',
            82: '⛈️',
            85: '❄️',
            86: '❄️',
            95: '⛈️',
            96: '⛈️',
            99: '⛈️'
        };

        async function searchCity() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('请输入城市名称 / Please enter a city name');
                return;
            }

            try {
                showLoading(true);
                showError('');

                // 获取城市坐标
                const geoResponse = await fetch(
                    `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`
                );
                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    showError('城市未找到 / City not found');
                    showLoading(false);
                    return;
                }

                const location = geoData.results[0];
                const { latitude, longitude, name, country, admin1 } = location;

                // 获取天气数据
                const weatherResponse = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code,wind_speed_10m,humidity,pressure_msl,visibility&hourly=temperature_2m,humidity,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto&forecast_days=5`
                );
                const weatherData = await weatherResponse.json();

                currentWeatherData = {
                    location: { name, country, admin1, latitude, longitude },
                    weather: weatherData
                };

                displayWeather(currentWeatherData);
            } catch (error) {
                console.error('Error:', error);
                showError('数据加载失败 / Failed to load data');
            } finally {
                showLoading(false);
            }
        }

        function displayWeather(data) {
            const { location, weather } = data;
            const current = weather.current;
            const hourly = weather.hourly;
            const daily = weather.daily;

            const isCelsius = currentUnit === 'celsius';
            const tempUnit = isCelsius ? '°C' : '°F';
            const speedUnit = isCelsius ? 'km/h' : 'mph';
            const pressureUnit = 'hPa';

            const temp = isCelsius ? current.temperature_2m : (current.temperature_2m * 9/5 + 32);
            const windSpeed = isCelsius ? current.wind_speed_10m : (current.wind_speed_10m * 0.621371);
            const visibility = isCelsius ? current.visibility : (current.visibility * 0.621371);

            const weatherCode = current.weather_code;
            const weatherIcon = weatherIcons[weatherCode] || '🌡️';
            const weatherDesc = getWeatherDescription(weatherCode);

            const sunrise = new Date(weather.daily.sunrise[0]).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            const sunset = new Date(weather.daily.sunset[0]).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            const currentHTML = `
                <div class="current-weather">
                    <div class="weather-main">
                        <div class="weather-icon">${weatherIcon}</div>
                        <div>
                            <div class="temperature">${temp.toFixed(1)}${tempUnit}</div>
                            <div class="condition">${weatherDesc}</div>
                            <div class="location">${location.name}, ${location.country}</div>
                            ${location.admin1 ? `<div class="location">${location.admin1}</div>` : ''}
                        </div>
                    </div>
                    <div class="weather-details">
                        <div class="detail-item">
                            <i class="fas fa-water"></i>
                            <div class="detail-label">湿度 / Humidity</div>
                            <div class="detail-value">${current.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-wind"></i>
                            <div class="detail-label">风速 / Wind Speed</div>
                            <div class="detail-value">${windSpeed.toFixed(1)} ${speedUnit}</div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-compress"></i>
                            <div class="detail-label">气压 / Pressure</div>
                            <div class="detail-value">${current.pressure_msl} ${pressureUnit}</div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-eye"></i>
                            <div class="detail-label">能见度 / Visibility</div>
                            <div class="detail-value">${(visibility / 1000).toFixed(1)} ${isCelsius ? 'km' : 'mi'}</div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-sun"></i>
                            <div class="detail-label">日出 / Sunrise</div>
                            <div class="detail-value">${sunrise}</div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-moon"></i>
                            <div class="detail-label">日落 / Sunset</div>
                            <div class="detail-value">${sunset}</div>
                        </div>
                    </div>
                </div>
            `;

            const forecastHTML = `
                <div class="forecast">
                    <h2>5 天预报 / 5-Day Forecast</h2>
                    <div class="forecast-grid">
                        ${daily.time.slice(0, 5).map((date, index) => {
                            const maxTemp = isCelsius ? daily.temperature_2m_max[index] : (daily.temperature_2m_max[index] * 9/5 + 32);
                            const minTemp = isCelsius ? daily.temperature_2m_min[index] : (daily.temperature_2m_min[index] * 9/5 + 32);
                            const code = daily.weather_code[index];
                            const icon = weatherIcons[code] || '🌡️';
                            const dateObj = new Date(date);
                            const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                            return `
                                <div class="forecast-card">
                                    <div class="forecast-date">${dateStr}</div>
                                    <div class="forecast-icon">${icon}</div>
                                    <div class="forecast-temp">${maxTemp.toFixed(0)}${tempUnit}</div>
                                    <div class="forecast-temp-range">${minTemp.toFixed(0)}${tempUnit}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;

            const chartsHTML = `
                <div class="charts-section">
                    <div class="chart-container">
                        <h3>24小时温度趋势 / 24-Hour Temperature</h3>
                        <div class="chart-wrapper">
                            <canvas id="temperatureChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h3>24小时湿度趋势 / 24-Hour Humidity</h3>
                        <div class="chart-wrapper">
                            <canvas id="humidityChart"></canvas>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('weatherContent').innerHTML = currentHTML + forecastHTML + chartsHTML;
            
            setTimeout(() => {
                updateCharts(hourly, isCelsius);
            }, 100);
        }

        function updateCharts(hourly, isCelsius) {
            const hours = hourly.time.slice(0, 24).map((time, index) => {
                const hour = new Date(time).getHours();
                return `${hour}:00`;
            });
            const temps = hourly.temperature_2m.slice(0, 24);
            const humidity = hourly.humidity.slice(0, 24);

            if (currentUnit !== 'celsius') {
                temps.forEach((t, i) => temps[i] = t * 9/5 + 32);
            }

            if (hourlyChart) hourlyChart.destroy();
            if (humidityChart) humidityChart.destroy();

            const tempCtx = document.getElementById('temperatureChart').getContext('2d');
            hourlyChart = new Chart(tempCtx, {
                type: 'line',
                data: {
                    labels: hours,
                    datasets: [{
                        label: '温度 / Temperature (' + (isCelsius ? '°C' : '°F') + ')',
                        data: temps.map(t => t.toFixed(1)),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true } },
                    scales: {
                        y: { beginAtZero: false }
                    }
                }
            });

            const humidityCtx = document.getElementById('humidityChart').getContext('2d');
            humidityChart = new Chart(humidityCtx, {
                type: 'line',
                data: {
                    labels: hours,
                    datasets: [{
                        label: '湿度 / Humidity (%)',
                        data: humidity,
                        borderColor: '#764ba2',
                        backgroundColor: 'rgba(118, 75, 162, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#764ba2',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true } },
                    scales: {
                        y: { min: 0, max: 100 }
                    }
                }
            });
        }

        function getWeatherDescription(code) {
            const descriptions = {
                0: 'Clear Sky',
                1: 'Mainly Clear',
                2: 'Partly Cloudy',
                3: 'Overcast',
                45: 'Foggy',
                48: 'Depositing Rime Fog',
                51: 'Light Drizzle',
                53: 'Moderate Drizzle',
                55: 'Dense Drizzle',
                61: 'Slight Rain',
                63: 'Moderate Rain',
                65: 'Heavy Rain',
                71: 'Slight Snow',
                73: 'Moderate Snow',
                75: 'Heavy Snow',
                77: 'Snow Grains',
                80: 'Slight Rain Showers',
                81: 'Moderate Rain Showers',
                82: 'Violent Rain Showers',
                85: 'Slight Snow Showers',
                86: 'Heavy Snow Showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with Slight Hail',
                99: 'Thunderstorm with Heavy Hail'
            };
            return descriptions[code] || 'Unknown';
        }

        function setUnit(unit) {
            currentUnit = unit;
            document.querySelectorAll('.unit-toggle button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (currentWeatherData) {
                displayWeather(currentWeatherData);
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            if (message) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        }

        // 页面加载时获取默认城市
        window.addEventListener('load', () => {
            document.getElementById('cityInput').value = 'New York';
            searchCity();
        });

        // 回车搜索
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('cityInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchCity();
                }
            });
        });
    </script>
</body>
</html>
